<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Validator</title>
    <!-- FIX: Corrected Vis-Network library path -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #network { flex-grow: 1; height: 100%; background-color: #f8f9fa; }
        #sidebar { width: 320px; border-left: 1px solid #ccc; padding: 20px; background: #fff; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid #0056b3; padding-bottom: 8px; }
        .property { margin-bottom: 10px; font-size: 14px; }
        .label { font-weight: bold; color: #555; }
        #loading { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); font-size: 20px; color: #666; }
    </style>
</head>
<body>

    <div id="loading">Loading Knowledge Graph...</div>
    <div id="network"></div>

    <div id="sidebar">
        <h3>Node Inspector</h3>
        <p id="instruction">Click any node or connection to inspect its properties and check for accuracy.</p>
        <div id="details"></div>
    </div>

    <script type="text/javascript">
        fetch('graph.json')
            .then(response => {
                if (!response.ok) throw new Error("Could not load graph.json");
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                const nodesMap = new Map();
                const edges = [];

                // Helper to extract Identity
                const getId = (identity) => {
                    if (typeof identity === 'object' && identity !== null) {
                        return identity.low !== undefined ? identity.low : JSON.stringify(identity);
                    }
                    return identity;
                };

                // 2. Parse Neo4j JSON
                data.forEach(row => {
                    // Extract nodes (n and m)
                    ['n', 'm'].forEach(key => {
                        if (row[key]) {
                            const node = row[key];
                            const id = getId(node.identity);
                            
                            if (!nodesMap.has(id)) {
                                const labelText = node.properties.name || node.properties.title || node.properties.label || id;
                                nodesMap.set(id, {
                                    id: id,
                                    label: String(labelText),
                                    title: `Labels: ${node.labels ? node.labels.join(', ') : 'None'}`,
                                    properties: node.properties || {},
                                    labels: node.labels || [],
                                    color: { background: '#97c2fc', border: '#2b7ce9' }
                                });
                            }
                        }
                    });

                    // Extract relationship (r)
                    if (row.r) {
                        const rel = row.r;
                        edges.push({
                            id: getId(rel.identity),
                            from: getId(rel.start),
                            to: getId(rel.end),
                            label: rel.type,
                            font: { align: 'top', size: 12 },
                            arrows: 'to',
                            properties: rel.properties || {},
                            color: { color: '#848484' }
                        });
                    }
                });

                const nodesArray = Array.from(nodesMap.values());
                const nodesDS = new vis.DataSet(nodesArray);
                const edgesDS = new vis.DataSet(edges);

                // 3. Initialize Vis.js
                const container = document.getElementById('network');
                const networkData = { nodes: nodesDS, edges: edgesDS };
                
                const options = {
                    physics: {
                        enabled: true,
                        barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 150 },
                        stabilization: { iterations: 100 }
                    },
                    interaction: { hover: true, navigationButtons: true }
                };

                const network = new vis.Network(container, networkData, options);

                // 4. Interaction Logic
                network.on("click", function (params) {
                    const detailsDiv = document.getElementById('details');
                    const instruction = document.getElementById('instruction');
                    detailsDiv.innerHTML = "";

                    if (params.nodes.length > 0) {
                        const selectedId = params.nodes[0];
                        const clickedNode = nodesDS.get(selectedId);
                        instruction.style.display = "none";
                        
                        let html = `<p><span class="label">ID:</span> ${clickedNode.id}</p>`;
                        html += `<p><span class="label">Labels:</span> ${clickedNode.labels.join(', ')}</p><h4>Properties:</h4>`;
                        for (const [key, val] of Object.entries(clickedNode.properties)) {
                            html += `<div class="property"><span class="label">${key}:</span> ${val}</div>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else if (params.edges.length > 0) {
                        const selectedEdgeId = params.edges[0];
                        const clickedEdge = edgesDS.get(selectedEdgeId);
                        instruction.style.display = "none";
                        
                        let html = `<p><span class="label">Relationship:</span> ${clickedEdge.label}</p><h4>Properties:</h4>`;
                        if (clickedEdge.properties && Object.keys(clickedEdge.properties).length > 0) {
                            for (const [key, val] of Object.entries(clickedEdge.properties)) {
                                html += `<div class="property"><span class="label">${key}:</span> ${val}</div>`;
                            }
                        } else {
                            html += `<p>No extra properties found.</p>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else {
                        instruction.style.display = "block";
                    }
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = "Error loading data. Check console (F12).";
            });
    </script>
</body>
</html>
