<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Validator</title>
    
    <!-- CHANGED: Using cdnjs for better reliability -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/standalone/umd/vis-network.min.js" integrity="sha512-97I8YUEo69S94NolIs3InXAnV+o077Ssc73Z6v2R60K6I0H0w6Hto7X8kO1F62f8W3lW9fXf0qY0G8U4iF6rWw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #network { flex-grow: 1; height: 100%; background-color: #f8f9fa; }
        #sidebar { width: 320px; border-left: 1px solid #ccc; padding: 20px; background: #fff; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid #0056b3; padding-bottom: 8px; }
        .property { margin-bottom: 10px; font-size: 14px; }
        .label { font-weight: bold; color: #555; }
        #loading { position: absolute; top: 50%; left: 40%; transform: translate(-50%, -50%); font-size: 20px; color: #666; }
    </style>
</head>
<body>

    <div id="loading">Loading Knowledge Graph...</div>
    <div id="network"></div>

    <div id="sidebar">
        <h3>Node Inspector</h3>
        <p id="instruction">Click any node or connection to inspect its properties.</p>
        <div id="details"></div>
    </div>

    <script type="text/javascript">
        // Safety check: Wait for library to be fully ready
        window.onload = function() {
            if (typeof vis === 'undefined') {
                document.getElementById('loading').innerHTML = "Error: Vis-Network library failed to load. Check your internet connection.";
                return;
            }

            fetch('graph.json')
                .then(response => {
                    if (!response.ok) throw new Error("Could not load graph.json - check file name case sensitivity!");
                    return response.json();
                })
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    
                    const nodesMap = new Map();
                    const edges = [];

                    // Identity parser for Neo4j's {low, high} format
                    const getId = (id) => {
                        if (id !== null && typeof id === 'object') {
                            return id.low !== undefined ? id.low : JSON.stringify(id);
                        }
                        return id;
                    };

                    data.forEach(row => {
                        // Process nodes n and m
                        ['n', 'm'].forEach(key => {
                            if (row[key]) {
                                const n = row[key];
                                const id = getId(n.identity);
                                if (!nodesMap.has(id)) {
                                    nodesMap.set(id, {
                                        id: id,
                                        label: String(n.properties.name || n.properties.title || id),
                                        properties: n.properties || {},
                                        labels: n.labels || [],
                                        title: `Type: ${n.labels ? n.labels.join(',') : 'Node'}`,
                                        color: { background: '#D2E5FF', border: '#2B7CE9' }
                                    });
                                }
                            }
                        });

                        // Process relationship r
                        if (row.r) {
                            const r = row.r;
                            edges.push({
                                id: getId(r.identity),
                                from: getId(r.start),
                                to: getId(r.end),
                                label: r.type,
                                arrows: 'to',
                                font: { size: 12, color: '#343434' },
                                properties: r.properties || {}
                            });
                        }
                    });

                    const nodesArray = Array.from(nodesMap.values());
                    const container = document.getElementById('network');
                    const networkData = {
                        nodes: new vis.DataSet(nodesArray),
                        edges: new vis.DataSet(edges)
                    };
                    
                    const options = {
                        physics: {
                            enabled: true,
                            barnesHut: { gravitationalConstant: -2000 },
                            stabilization: { iterations: 150 }
                        }
                    };

                    const network = new vis.Network(container, networkData, options);

                    // Click handler
                    network.on("click", function(params) {
                        const detailsDiv = document.getElementById('details');
                        const instruction = document.getElementById('instruction');
                        detailsDiv.innerHTML = "";

                        if (params.nodes.length > 0) {
                            const node = nodesArray.find(n => n.id === params.nodes[0]);
                            instruction.style.display = "none";
                            let html = `<b>Labels:</b> ${node.labels.join(', ')}<br><h4>Properties:</h4>`;
                            for (let [k, v] of Object.entries(node.properties)) {
                                html += `<div class="property"><b>${k}:</b> ${v}</div>`;
                            }
                            detailsDiv.innerHTML = html;
                        } else {
                            instruction.style.display = "block";
                        }
                    });

                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('loading').innerHTML = "Error: " + err.message;
                });
        };
    </script>
</body>
</html>
