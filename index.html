<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Islamic Social Finance KG</title>
    <script type="text/javascript" src="vis-network.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #wrapper { display: flex; height: 100vh; width: 100vw; }
        #network { flex: 1; height: 100%; background: #fafafa; border-right: 1px solid #ccc; }
        #sidebar { width: 300px; padding: 20px; overflow-y: auto; background: white; }
        #status { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-size: 12px; border-radius: 4px; z-index: 1000; }
        .prop { margin-bottom: 5px; font-size: 13px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="status">Status: Initializing...</div>
    
    <div id="wrapper">
        <div id="network"></div>
        <div id="sidebar">
            <h3>Inspector</h3>
            <div id="details">Select a node.</div>
        </div>
    </div>

    <script type="text/javascript">
        const statusEl = document.getElementById('status');
        
        function updateStatus(msg) {
            statusEl.innerText = "Status: " + msg;
            console.log(msg);
        }

        // Helper to handle Neo4j large IDs
        function parseNeoId(id) {
            if (typeof id === 'object' && id !== null) {
                return id.low !== undefined ? id.low : JSON.stringify(id);
            }
            return id;
        }

        updateStatus("Fetching graph.json...");

        fetch('graph.json')
            .then(res => {
                if (!res.ok) throw new Error("File not found (404)");
                return res.json();
            })
            .then(data => {
                updateStatus("Data loaded. Parsing " + data.length + " rows...");
                
                const nodesMap = new Map();
                const edges = [];

                data.forEach((row, i) => {
                    // Extract N and M nodes
                    ['n', 'm'].forEach(key => {
                        if (row[key]) {
                            const node = row[key];
                            const id = parseNeoId(node.identity);
                            if (!nodesMap.has(id)) {
                                nodesMap.set(id, {
                                    id: id,
                                    label: node.properties.name || node.properties.meaning || String(id),
                                    title: node.labels.join(', '),
                                    properties: node.properties,
                                    group: node.labels[0]
                                });
                            }
                        }
                    });

                    // Extract R relationship
                    if (row.r) {
                        edges.push({
                            from: parseNeoId(row.r.start),
                            to: parseNeoId(row.r.end),
                            label: row.r.type,
                            arrows: 'to'
                        });
                    }
                });

                updateStatus("Building Network with " + nodesMap.size + " nodes...");

                const container = document.getElementById('network');
                const networkData = {
                    nodes: new vis.DataSet(Array.from(nodesMap.values())),
                    edges: new vis.DataSet(edges)
                };

                const options = {
                    physics: {
                        enabled: true,
                        barnesHut: { gravitationalConstant: -2000, springLength: 100 },
                        stabilization: { iterations: 50 }
                    },
                    layout: { improvedLayout: true }
                };

                const network = new vis.Network(container, networkData, options);

                network.on("stabilizationIterationsDone", function () {
                    updateStatus("Graph Stabilized.");
                    network.fit();
                });

                network.on("click", function(params) {
                    if (params.nodes.length > 0) {
                        const node = networkData.nodes.get(params.nodes[0]);
                        let html = `<b>Name:</b> ${node.label}<br><b>Labels:</b> ${node.title}<hr>`;
                        for (let [k,v] of Object.entries(node.properties)) {
                            html += `<div class="prop"><b>${k}:</b> ${v}</div>`;
                        }
                        document.getElementById('details').innerHTML = html;
                    }
                });

            })
            .catch(err => {
                updateStatus("ERROR: " + err.message);
                console.error(err);
            });
    </script>
</body>
</html>
