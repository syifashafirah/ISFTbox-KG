<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Islamic Social Finance Knowledge Graph</title>
    <!-- Assuming you uploaded this file to your GitHub as per previous step -->
    <script type="text/javascript" src="vis-network.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }
        #network { flex-grow: 1; background-color: #f4f7f9; }
        #sidebar { width: 350px; border-left: 1px solid #ddd; padding: 20px; background: white; overflow-y: auto; box-shadow: -3px 0 10px rgba(0,0,0,0.05); }
        .node-label { font-weight: bold; color: #0056b3; font-size: 1.2em; }
        .prop-item { margin: 8px 0; font-size: 0.9em; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .prop-key { font-weight: bold; color: #555; text-transform: capitalize; }
        #loading { position: absolute; top: 50%; left: 45%; font-size: 1.5em; color: #666; }
    </style>
</head>
<body>

    <div id="loading">Building Knowledge Graph...</div>
    <div id="network"></div>

    <div id="sidebar">
        <h3>Details</h3>
        <div id="details">Click a node or connection to see Islamic Social Finance properties.</div>
    </div>

    <script type="text/javascript">
        fetch('graph.json')
            .then(res => res.json())
            .then(rawData => {
                document.getElementById('loading').style.display = 'none';

                const nodesMap = new Map();
                const edges = [];

                // PARSER: Specifically for your n -> r -> m format
                rawData.forEach(row => {
                    // 1. Process Node 'n'
                    if (row.n) {
                        addNode(row.n);
                    }
                    // 2. Process Node 'm'
                    if (row.m) {
                        addNode(row.m);
                    }
                    // 3. Process Relationship 'r'
                    if (row.r) {
                        edges.push({
                            id: row.r.identity,
                            from: row.r.start,
                            to: row.r.end,
                            label: row.r.type,
                            arrows: 'to',
                            color: { color: '#848484' },
                            font: { size: 10, align: 'top' }
                        });
                    }
                });

                function addNode(neoNode) {
                    const id = neoNode.identity;
                    if (!nodesMap.has(id)) {
                        // Priority for labels: name -> meaning -> identity
                        const label = neoNode.properties.name || neoNode.properties.meaning || `ID: ${id}`;
                        nodesMap.set(id, {
                            id: id,
                            label: label,
                            title: neoNode.labels.join(', '), // Hover tooltip
                            properties: neoNode.properties,
                            labels: neoNode.labels,
                            // Styling based on Label
                            color: getColor(neoNode.labels)
                        });
                    }
                }

                function getColor(labels) {
                    if (labels.includes('Stakeholder')) return { background: '#D2E5FF', border: '#2B7CE9' };
                    if (labels.includes('Instrument')) return { background: '#FFF4D2', border: '#E9AF2B' };
                    if (labels.includes('Domain')) return { background: '#D2FFD6', border: '#2BE94F' };
                    return { background: '#eeeeee', border: '#cccccc' };
                }

                const container = document.getElementById('network');
                const data = {
                    nodes: new vis.DataSet(Array.from(nodesMap.values())),
                    edges: new vis.DataSet(edges)
                };

                const options = {
                    physics: {
                        stabilization: true,
                        barnesHut: { gravitationalConstant: -3000, springLength: 150 }
                    },
                    interaction: { hover: true }
                };

                const network = new vis.Network(container, data, options);

                // Sidebar Interaction
                network.on("click", function(params) {
                    const detailsDiv = document.getElementById('details');
                    if (params.nodes.length > 0) {
                        const node = data.nodes.get(params.nodes[0]);
                        let html = `<div class="node-label">${node.label}</div>`;
                        html += `<p><b>Labels:</b> ${node.labels.join(', ')}</p><hr>`;
                        for (let [k, v] of Object.entries(node.properties)) {
                            html += `<div class="prop-item"><span class="prop-key">${k}:</span> ${v}</div>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else {
                        detailsDiv.innerHTML = "Click a node to see details";
                    }
                });
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "Error loading graph.json: " + err.message;
            });
    </script>
</body>
</html>
