<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Graph Validator</title>
    <!-- Load Vis-Network library from CDN -->
    <script type="text/javascript" src="https://unpkg.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #network { flex-grow: 1; height: 100%; background-color: #f8f9fa; }
        #sidebar { width: 320px; border-left: 1px solid #ccc; padding: 20px; background: #fff; overflow-y: auto; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #333; border-bottom: 2px solid #0056b3; padding-bottom: 8px; }
        .property { margin-bottom: 10px; font-size: 14px; }
        .label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <!-- Left side: Interactive Graph -->
    <div id="network"></div>

    <!-- Right side: Validation Sidebar -->
    <div id="sidebar">
        <h3>Node Inspector</h3>
        <p id="instruction">Click any node or connection to inspect its properties and check for accuracy.</p>
        <div id="details"></div>
    </div>

    <script type="text/javascript">
        // 1. Fetch data from your exported file
        fetch('graph.json')
            .then(response => response.json())
            .then(data => {
                const nodesMap = new Map();
                const edges = [];

                // 2. Parse Neo4j Browser JSON format into Vis.js format
                data.forEach(row => {
                    // Extract node details
                    ['n', 'm'].forEach(key => {
                        if (row[key]) {
                            const node = row[key];
                            const labelText = node.properties.name || node.properties.title || node.identity;
                            nodesMap.set(node.identity, {
                                id: node.identity,
                                label: String(labelText),
                                title: `Label: ${node.labels.join(', ')}`, // Hover tooltip
                                properties: node.properties,
                                labels: node.labels,
                                color: { background: '#97c2fc', border: '#2b7ce9' }
                            });
                        }
                    });

                    // Extract relationship details
                    if (row.r) {
                        const rel = row.r;
                        edges.push({
                            id: rel.identity,
                            from: rel.start,
                            to: rel.end,
                            label: rel.type,
                            font: { align: 'top', size: 12 },
                            arrows: 'to',
                            properties: rel.properties,
                            color: { color: '#848484' }
                        });
                    }
                });

                const nodes = Array.from(nodesMap.values());

                // 3. Initialize Vis.js Network
                const container = document.getElementById('network');
                const networkData = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
                
                const options = {
                    physics: { barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 95 } },
                    interaction: { hover: true, navigationButtons: true }
                };

                const network = new vis.Network(container, networkData, options);

                // 4. Handle Clicks to show information in Sidebar
                network.on("click", function (params) {
                    const detailsDiv = document.getElementById('details');
                    const instruction = document.getElementById('instruction');
                    detailsDiv.innerHTML = "";

                    if (params.nodes.length > 0) {
                        // Node selected
                        const selectedNodeId = params.nodes[0];
                        const clickedNode = nodes.find(n => n.id === selectedNodeId);
                        instruction.style.display = "none";
                        
                        let html = `<p><span class="label">ID:</span> ${clickedNode.id}</p>`;
                        html += `<p><span class="label">Type:</span> ${clickedNode.labels.join(', ')}</p><h4>Properties:</h4>`;
                        for (const [key, val] of Object.entries(clickedNode.properties)) {
                            html += `<div class="property"><span class="label">${key}:</span> ${val}</div>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else if (params.edges.length > 0) {
                        // Edge selected
                        const selectedEdgeId = params.edges[0];
                        const clickedEdge = edges.find(e => e.id === selectedEdgeId);
                        instruction.style.display = "none";
                        
                        let html = `<p><span class="label">Relationship:</span> ${clickedEdge.label}</p><h4>Properties:</h4>`;
                        if (clickedEdge.properties && Object.keys(clickedEdge.properties).length > 0) {
                            for (const [key, val] of Object.entries(clickedEdge.properties)) {
                                html += `<div class="property"><span class="label">${key}:</span> ${val}</div>`;
                            }
                        } else {
                            html += `<p>No extra properties found.</p>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else {
                        // Clicked on empty background
                        instruction.style.display = "block";
                    }
                });
            })
            .catch(error => console.error('Error reading graph.json:', error));
    </script>
</body>
</html>
