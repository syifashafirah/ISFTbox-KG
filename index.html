<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ISF Knowledge Graph v2</title>
    <script type="text/javascript" src="vis-network.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #wrapper { display: flex; height: 100vh; width: 100vw; }
        #network { flex: 1; height: 100%; background: #fdfdfd; }
        #sidebar { width: 320px; padding: 20px; overflow-y: auto; background: white; border-left: 1px solid #ddd; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        #status { position: absolute; bottom: 15px; left: 15px; background: rgba(50,50,50,0.9); color: white; padding: 8px 12px; font-size: 12px; border-radius: 20px; z-index: 1000; transition: opacity 0.5s; }
        h3 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .prop { margin-bottom: 8px; font-size: 13px; padding: 5px; background: #f9f9f9; border-radius: 4px; }
        .prop b { color: #34495e; text-transform: capitalize; }
    </style>
</head>
<body>

    <div id="status">Status: Initializing...</div>
    
    <div id="wrapper">
        <div id="network"></div>
        <div id="sidebar">
            <h3>Node Inspector</h3>
            <div id="details">Select a node to explore Islamic Social Finance properties.</div>
        </div>
    </div>

    <script type="text/javascript">
        const statusEl = document.getElementById('status');
        function updateStatus(msg) { statusEl.innerText = "Status: " + msg; console.log(msg); }

        function parseNeoId(id) {
            if (typeof id === 'object' && id !== null) {
                return id.low !== undefined ? id.low : JSON.stringify(id);
            }
            return id;
        }

        // Add a timestamp to bypass Incognito cache issues
        fetch('graph.json?t=' + new Date().getTime())
            .then(res => {
                if (!res.ok) throw new Error("Could not find the graph data file.");
                return res.json();
            })
            .then(data => {
                // Verification check:
                if (!Array.isArray(data)) {
                    throw new Error("The graph.json file is a dashboard config, not node data. Please export Query Results instead.");
                }

                updateStatus("Parsing " + data.length + " data rows...");
                
                const nodesMap = new Map();
                const edges = [];

                data.forEach(row => {
                    ['n', 'm'].forEach(key => {
                        if (row[key]) {
                            const node = row[key];
                            const id = parseNeoId(node.identity);
                            if (!nodesMap.has(id)) {
                                nodesMap.set(id, {
                                    id: id,
                                    label: String(node.properties.name || node.properties.meaning || id),
                                    title: "Labels: " + node.labels.join(', '),
                                    properties: node.properties,
                                    labels: node.labels,
                                    group: node.labels[0]
                                });
                            }
                        }
                    });

                    if (row.r) {
                        edges.push({
                            from: parseNeoId(row.r.start),
                            to: parseNeoId(row.r.end),
                            label: row.r.type,
                            arrows: 'to',
                            color: { color: '#999999' },
                            font: { size: 11, color: '#333', align: 'top' }
                        });
                    }
                });

                const container = document.getElementById('network');
                const networkData = {
                    nodes: new vis.DataSet(Array.from(nodesMap.values())),
                    edges: new vis.DataSet(edges)
                };

                const options = {
                    physics: {
                        enabled: true,
                        solver: 'forceAtlas2Based',
                        forceAtlas2Based: { gravitationalConstant: -50, springLength: 100 },
                        stabilization: { iterations: 150 }
                    },
                    interaction: { dragNodes: true, hover: true }
                };

                const network = new vis.Network(container, networkData, options);

                // --- FEATURE: DRAG AND STAY ---
                // Disable physics after initial layout so nodes stay where they are put
                network.on("stabilizationIterationsDone", function () {
                    network.setOptions({ physics: false });
                    updateStatus("Graph Ready. Drag nodes to reposition them.");
                    setTimeout(() => statusEl.style.opacity = '0.4', 3000);
                });

                // Pin nodes when dragged
                network.on("dragEnd", function (params) {
                    if (params.nodes.length > 0) {
                        networkData.nodes.update({id: params.nodes[0], fixed: true});
                    }
                });

                // Sidebar click logic
                network.on("click", function(params) {
                    const detailsDiv = document.getElementById('details');
                    if (params.nodes.length > 0) {
                        const node = networkData.nodes.get(params.nodes[0]);
                        let html = `<h4>${node.label}</h4>`;
                        html += `<p><b>Type:</b> ${node.labels.join(' / ')}</p><hr>`;
                        for (let [k,v] of Object.entries(node.properties)) {
                            html += `<div class="prop"><b>${k}:</b> ${v}</div>`;
                        }
                        detailsDiv.innerHTML = html;
                    } else {
                        detailsDiv.innerHTML = "Select a node to see details.";
                    }
                });
            })
            .catch(err => {
                updateStatus("ERROR: " + err.message);
                document.getElementById('network').innerHTML = `<div style="padding:50px; color:red;">${err.message}</div>`;
            });
    </script>
</body>
</html>
